<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="System Architecture Flow Diagram">
  <title>System Architecture Diagram</title>
  <defs>
    <!-- CSS Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      .node-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; fill: #FFFFFF; }
      .node-desc { font-family: 'Inter', sans-serif; font-size: 11px; fill: #94A3B8; }
      .node-tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; fill: #00E5FF; }
      .diagram-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 20px; fill: #F8FAFC; letter-spacing: -0.5px; }
      .diagram-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #64748B; }
      
      /* Animation styles */
      .dash-flow {
        stroke-dasharray: 8 6;
        animation: flowAnimation 25s linear indefinite;
      }
      @keyframes flowAnimation {
        to {
          stroke-dashoffset: -1000;
        }
      }
    </style>

    <!-- Master Shadow & Glow Filters -->
    <filter id="nodeGlowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00C8FF" flood-opacity="0.3"/>
    </filter>
    <filter id="nodeGlowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#22C55E" flood-opacity="0.3"/>
    </filter>
    <filter id="nodeGlowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#F59E0B" flood-opacity="0.3"/>
    </filter>
    <filter id="nodeGlowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#EF4444" flood-opacity="0.3"/>
    </filter>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070A"/>
    </linearGradient>

    <!-- Connection flow path gradients -->
    <linearGradient id="flowGradBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C8FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00C8FF" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="flowGradGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Subtle grid dots in diagram background -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="1.5" fill="#94A3B8"/><circle cx="150" cy="50" r="1.5" fill="#94A3B8"/><circle cx="250" cy="50" r="1.5" fill="#94A3B8"/><circle cx="350" cy="50" r="1.5" fill="#94A3B8"/><circle cx="450" cy="50" r="1.5" fill="#94A3B8"/><circle cx="550" cy="50" r="1.5" fill="#94A3B8"/><circle cx="650" cy="50" r="1.5" fill="#94A3B8"/><circle cx="750" cy="50" r="1.5" fill="#94A3B8"/>
    <circle cx="50" cy="150" r="1.5" fill="#94A3B8"/><circle cx="150" cy="150" r="1.5" fill="#94A3B8"/><circle cx="250" cy="150" r="1.5" fill="#94A3B8"/><circle cx="350" cy="150" r="1.5" fill="#94A3B8"/><circle cx="450" cy="150" r="1.5" fill="#94A3B8"/><circle cx="550" cy="150" r="1.5" fill="#94A3B8"/><circle cx="650" cy="150" r="1.5" fill="#94A3B8"/><circle cx="750" cy="150" r="1.5" fill="#94A3B8"/>
    <circle cx="50" cy="250" r="1.5" fill="#94A3B8"/><circle cx="150" cy="250" r="1.5" fill="#94A3B8"/><circle cx="250" cy="250" r="1.5" fill="#94A3B8"/><circle cx="350" cy="250" r="1.5" fill="#94A3B8"/><circle cx="450" cy="250" r="1.5" fill="#94A3B8"/><circle cx="550" cy="250" r="1.5" fill="#94A3B8"/><circle cx="650" cy="250" r="1.5" fill="#94A3B8"/><circle cx="750" cy="250" r="1.5" fill="#94A3B8"/>
    <circle cx="50" cy="350" r="1.5" fill="#94A3B8"/><circle cx="150" cy="350" r="1.5" fill="#94A3B8"/><circle cx="250" cy="350" r="1.5" fill="#94A3B8"/><circle cx="350" cy="350" r="1.5" fill="#94A3B8"/><circle cx="450" cy="350" r="1.5" fill="#94A3B8"/><circle cx="550" cy="350" r="1.5" fill="#94A3B8"/><circle cx="650" cy="350" r="1.5" fill="#94A3B8"/><circle cx="750" cy="350" r="1.5" fill="#94A3B8"/>
    <circle cx="50" cy="450" r="1.5" fill="#94A3B8"/><circle cx="150" cy="450" r="1.5" fill="#94A3B8"/><circle cx="250" cy="450" r="1.5" fill="#94A3B8"/><circle cx="350" cy="450" r="1.5" fill="#94A3B8"/><circle cx="450" cy="450" r="1.5" fill="#94A3B8"/><circle cx="550" cy="450" r="1.5" fill="#94A3B8"/><circle cx="650" cy="450" r="1.5" fill="#94A3B8"/><circle cx="750" cy="450" r="1.5" fill="#94A3B8"/>
  </g>

  <!-- Title Section -->
  <g transform="translate(40, 45)">
    <text x="0" y="0" class="diagram-title">System Architecture Blueprint</text>
    <text x="0" y="20" class="diagram-subtitle">Backend Core Service Integration Pipeline &amp; Future State</text>
  </g>

  <!-- ========================================== -->
  <!-- Connection Flows & Arrows                 -->
  <!-- ========================================== -->
  <g>
    <!-- React -> Spring Boot (HTTP/WS) -->
    <path d="M 190 230 L 290 230" fill="none" stroke="#1E293B" stroke-width="3"/>
    <path class="dash-flow" d="M 190 230 L 290 230" fill="none" stroke="url(#flowGradBlue)" stroke-width="3"/>
    
    <!-- Spring Boot -> Redis (Future Caching) -->
    <path d="M 390 190 Q 420 120 490 120" fill="none" stroke="#1E293B" stroke-width="3"/>
    <path class="dash-flow" d="M 390 190 Q 420 120 490 120" fill="none" stroke="url(#flowGradGreen)" stroke-width="3"/>

    <!-- Spring Boot -> MySQL (JPA/Hibernate) -->
    <path d="M 390 230 L 490 230" fill="none" stroke="#1E293B" stroke-width="3"/>
    <path class="dash-flow" d="M 390 230 L 490 230" fill="none" stroke="url(#flowGradGreen)" stroke-width="3"/>

    <!-- Spring Boot -> Docker (Containerization Deployment) -->
    <path d="M 390 270 Q 420 340 490 340" fill="none" stroke="#1E293B" stroke-width="3"/>
    <path class="dash-flow" d="M 390 270 Q 420 340 490 340" fill="none" stroke="url(#flowGradGreen)" stroke-width="3"/>

    <!-- Docker -> AWS (Future Infrastructure deployment) -->
    <path d="M 590 340 L 690 340" fill="none" stroke="#1E293B" stroke-width="3"/>
    <path class="dash-flow" d="M 590 340 L 690 340" fill="none" stroke="url(#flowGradBlue)" stroke-width="3"/>
  </g>

  <!-- ========================================== -->
  <!-- Nodes Definition                          -->
  <!-- ========================================== -->

  <!-- NODE 1: React (Frontend UI Client) -->
  <g transform="translate(40, 180)" filter="url(#nodeGlowBlue)">
    <rect x="0" y="0" width="150" height="100" rx="12" fill="#0A0F1D" stroke="#00C8FF" stroke-width="1.5"/>
    <rect x="0" y="0" width="150" height="28" rx="11" fill="#0D1527" fill-opacity="0.9"/>
    <!-- React Logo representation -->
    <ellipse cx="25" cy="14" rx="8" ry="3" fill="none" stroke="#00C8FF" stroke-width="1" transform="rotate(30, 25, 14)"/>
    <ellipse cx="25" cy="14" rx="8" ry="3" fill="none" stroke="#00C8FF" stroke-width="1" transform="rotate(-30, 25, 14)"/>
    <circle cx="25" cy="14" r="2" fill="#00C8FF"/>
    
    <text x="45" y="19" class="node-title" font-size="13">React SPA</text>
    <text x="15" y="55" class="node-title">Web Frontend</text>
    <text x="15" y="73" class="node-desc">Client UI &amp; WebSockets</text>
    <text x="15" y="90" class="node-tag">HTTP / WS</text>
  </g>

  <!-- NODE 2: Spring Boot (Backend Core REST API Server) -->
  <g transform="translate(290, 180)" filter="url(#nodeGlowGreen)">
    <rect x="0" y="0" width="170" height="100" rx="12" fill="#0A0F1D" stroke="#22C55E" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="28" rx="11" fill="#0F1F18" fill-opacity="0.9"/>
    
    <!-- Spring Leaf icon -->
    <path d="M 20 20 Q 28 10 32 15 Q 34 22 24 22 Z" fill="#22C55E"/>
    <path d="M 24 22 L 20 20" stroke="#FFFFFF" stroke-width="1"/>
    
    <text x="45" y="19" class="node-title" font-size="13">Spring Boot</text>
    <text x="15" y="55" class="node-title">Quant Core Service</text>
    <text x="15" y="73" class="node-desc">REST API, JWT, TA4J</text>
    <text x="15" y="90" class="node-tag" fill="#22C55E">JAVA 17 ENGINE</text>
  </g>

  <!-- NODE 3: Redis Caching (Future Scope) -->
  <g transform="translate(490, 70)" filter="url(#nodeGlowRed)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#0A0F1D" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="0" y="0" width="160" height="28" rx="11" fill="#251115" fill-opacity="0.9"/>
    
    <!-- Redis logo style -->
    <rect x="18" y="9" width="14" height="10" rx="2" fill="#EF4444"/>
    <line x1="18" y1="14" x2="32" y2="14" stroke="#FFFFFF" stroke-width="1"/>
    
    <text x="42" y="19" class="node-title" font-size="13">Redis Cache</text>
    <text x="15" y="55" class="node-title">Memory Store</text>
    <text x="15" y="73" class="node-desc">Rapid quote buffering</text>
    <text x="15" y="90" class="node-tag" fill="#EF4444">FUTURE IMPLEMENT</text>
  </g>

  <!-- NODE 4: MySQL (Persistent Relational Database) -->
  <g transform="translate(490, 180)" filter="url(#nodeGlowOrange)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#0A0F1D" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="11" fill="#251A0F" fill-opacity="0.9"/>
    
    <!-- MySQL cylinder shape representation -->
    <ellipse cx="25" cy="12" rx="7" ry="3" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <path d="M 18 12 L 18 20 A 7 3 0 0 0 32 20 L 32 12" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    
    <text x="42" y="19" class="node-title" font-size="13">MySQL Database</text>
    <text x="15" y="55" class="node-title">Persistent DB</text>
    <text x="15" y="73" class="node-desc">Transaction records</text>
    <text x="15" y="90" class="node-tag" fill="#F59E0B">JPA / HIBERNATE</text>
  </g>

  <!-- NODE 5: Docker (Container Sandboxing) -->
  <g transform="translate(490, 290)" filter="url(#nodeGlowBlue)">
    <rect x="0" y="0" width="160" height="100" rx="12" fill="#0A0F1D" stroke="#00C8FF" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="11" fill="#0D1527" fill-opacity="0.9"/>
    
    <!-- Whale icon shape -->
    <path d="M 17 21 C 17 12 33 12 33 21 Z" fill="#00C8FF"/>
    
    <text x="42" y="19" class="node-title" font-size="13">Docker Engine</text>
    <text x="15" y="55" class="node-title">Container Sandbox</text>
    <text x="15" y="73" class="node-desc">Consistent environments</text>
    <text x="15" y="90" class="node-tag">LOCAL &amp; STAGING</text>
  </g>

  <!-- NODE 6: AWS Services (Future Cloud Hosting) -->
  <g transform="translate(690, 290)" filter="url(#nodeGlowOrange)">
    <rect x="0" y="0" width="150" height="100" rx="12" fill="#0A0F1D" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="4 4"/>
    <rect x="0" y="0" width="150" height="28" rx="11" fill="#291D0E" fill-opacity="0.9"/>
    
    <!-- AWS Cloud representation -->
    <path d="M 18 18 A 3 3 0 0 1 21 15 A 4 4 0 0 1 29 15 A 3 3 0 0 1 32 18 Z" fill="#FF9900"/>
    
    <text x="42" y="19" class="node-title" font-size="13">Amazon Web</text>
    <text x="15" y="55" class="node-title">AWS EC2 / ECS</text>
    <text x="15" y="73" class="node-desc">Scalable Web Servers</text>
    <text x="15" y="90" class="node-tag" fill="#FF9900">FUTURE DEPLOY</text>
  </g>

  <!-- Key Legend Panel -->
  <g transform="translate(40, 410)">
    <rect x="0" y="0" width="720" height="50" rx="8" fill="#111827" fill-opacity="0.8" stroke="#1E293B" stroke-width="1"/>
    
    <circle cx="20" cy="25" r="5" fill="#22C55E"/>
    <text x="32" y="29" class="node-desc" fill="#FFFFFF" font-weight="700">Spring Core Architecture</text>
    
    <circle cx="190" cy="25" r="5" fill="#00C8FF"/>
    <text x="202" y="29" class="node-desc" fill="#FFFFFF" font-weight="700">Client / Docker Layer</text>
    
    <circle cx="340" cy="25" r="5" fill="#EF4444" stroke="#EF4444" stroke-dasharray="2 2" stroke-width="1"/>
    <text x="352" y="29" class="node-desc" fill="#EF4444" font-weight="700">Dashed node = Future Scope</text>

    <!-- Data pipeline flow speed indicator -->
    <path d="M 520 25 L 560 25" stroke="#00C8FF" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="570" y="29" class="node-desc">Active Data Flow stream</text>
  </g>

</svg>
