<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Rithish Chowdary - Developer Portfolio Banner">
  <title>Rithish Chowdary - Portfolio Banner</title>
  <defs>
    <!-- Fonts & Typography styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Outfit:wght@400;500;600;700;800&amp;display=swap');
      .text-title { font-family: 'Outfit', 'Segoe UI', Inter, sans-serif; font-weight: 800; font-size: 58px; fill: url(#nameGradient); letter-spacing: -1.5px; }
      .text-subtitle { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 600; font-size: 21px; fill: #E2E8F0; letter-spacing: -0.2px; }
      .text-desc { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 400; font-size: 14px; fill: #94A3B8; line-height: 1.6; }
      .text-meta { font-family: 'JetBrains Mono', Consolas, monospace; font-weight: 500; font-size: 13px; fill: #64748B; letter-spacing: 0.5px; }
      .text-terminal { font-family: 'JetBrains Mono', Consolas, monospace; font-weight: 500; font-size: 14px; fill: #F8FAFC; line-height: 1.6; }
      .text-badge { font-family: 'JetBrains Mono', Consolas, monospace; font-weight: 700; font-size: 10px; fill: #00E5FF; letter-spacing: 1px; }
      .text-btn { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; fill: #0D1117; letter-spacing: 0.5px; }
      .text-label { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px; fill: #94A3B8; }
      
      /* Smooth transitions and hover states */
      .glow-on-hover { transition: filter 0.3s ease; }
      .glow-on-hover:hover { filter: url(#glowFilterHover); }
    </style>

    <!-- Master Gradients -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080B10"/>
      <stop offset="50%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070A"/>
    </linearGradient>

    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C8FF"/>
      <stop offset="50%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7B5BFF"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.85"/>
    </linearGradient>

    <linearGradient id="glassStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C8FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7B5BFF" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <linearGradient id="progressBarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C8FF"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <!-- Glowing Filters -->
    <radialGradient id="cyanAmbientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C8FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00C8FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="violetAmbientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B5BFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B5BFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orangeAmbientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <filter id="profileGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feFlood flood-color="#00C8FF" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Engineering Grid Pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3"/>
    </pattern>

    <!-- Profile Clipping Mask (height adjusted to 350 to leave room for text below image) -->
    <clipPath id="profileClip">
      <rect x="830" y="110" width="370" height="340" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <!-- ========================================== -->
  <!-- 1. Background Structure                    -->
  <!-- ========================================== -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  <rect width="1280" height="720" fill="url(#gridPattern)"/>

  <!-- Ambient Light Beams/Glows -->
  <circle cx="100" cy="100" r="400" fill="url(#cyanAmbientGlow)"/>
  <circle cx="1180" cy="200" r="500" fill="url(#violetAmbientGlow)"/>
  <circle cx="640" cy="650" r="350" fill="url(#orangeAmbientGlow)"/>

  <!-- Background Animated Particles -->
  <g opacity="0.6">
    <circle cx="150" cy="250" r="2" fill="#00C8FF">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;210;250" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="120" r="1.5" fill="#7B5BFF">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;150;120" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="300" r="2.5" fill="#00E5FF">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="300;260;300" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="600" r="2" fill="#F59E0B">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="600;560;600" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Stock Trend Line (Bloomberg/Quant theme background) -->
  <g opacity="0.15" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -50 480 Q 200 420 400 450 T 800 320 T 1200 240 T 1350 200" fill="none" stroke="#00C8FF" stroke-width="4"/>
    <path d="M -50 480 Q 200 420 400 450 T 800 320 T 1200 240 T 1350 200 L 1350 720 L -50 720 Z" fill="url(#cyanAmbientGlow)" stroke="none"/>
    <!-- Moving stock price pulse -->
    <circle cx="-50" cy="480" r="6" fill="#00E5FF">
      <animateMotion path="M -50 480 Q 200 420 400 450 T 800 320 T 1200 240 T 1350 200" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Decorative Border Accents -->
  <line x1="40" y1="40" x2="1240" y2="40" stroke="#1E293B" stroke-width="1" stroke-dasharray="10 10"/>
  <line x1="40" y1="680" x2="1240" y2="680" stroke="#1E293B" stroke-width="1" stroke-dasharray="10 10"/>

  <!-- ========================================== -->
  <!-- 2. Left Side Content (60%)                 -->
  <!-- ========================================== -->
  <g transform="translate(60, 80)">
    <!-- Tech Category Indicators -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="102" height="24" rx="12" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
      <circle cx="12" cy="12" r="4" fill="#00C8FF"/>
      <text x="24" y="16" class="text-badge">ENTERPRISE</text>
      
      <rect x="112" y="0" width="128" height="24" rx="12" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
      <circle cx="124" cy="12" r="4" fill="#22C55E"/>
      <text x="136" y="16" class="text-badge" fill="#22C55E">SYSTEM DESIGN</text>
    </g>

    <!-- Name & Professional Titles -->
    <text x="0" y="65" class="text-title">Java Backend Engineer</text>
    <text x="0" y="105" class="text-subtitle">Spring Boot | REST APIs | Quantitative Trading Systems</text>
    
    <!-- Description -->
    <text x="0" y="138" class="text-desc">Building scalable Java backend systems with Spring Boot, Docker, and MySQL while</text>
    <text x="0" y="158" class="text-desc">developing quantitative trading engines and AI-powered financial applications.</text>

    <!-- Interactive Terminal (Left 60% Panel) -->
    <g id="glassTerminal" transform="translate(0, 180)" filter="url(#softShadow)">
      <!-- Terminal Shell -->
      <rect x="0" y="0" width="670" height="285" rx="16" fill="url(#glassGradient)" stroke="url(#glassStroke)" stroke-width="1.5"/>
      
      <!-- Window Header -->
      <rect x="1" y="1" width="668" height="35" rx="15" fill="#0F172A" fill-opacity="0.9"/>
      <circle cx="20" cy="18" r="6" fill="#EF4444"/>
      <circle cx="40" cy="18" r="6" fill="#F59E0B"/>
      <circle cx="60" cy="18" r="6" fill="#10B981"/>
      <text x="335" y="23" text-anchor="middle" class="text-meta" fill="#64748B">rithish@quant-core-service:~/dev/equi-sense</text>

      <!-- Terminal Output Simulation with Typewriter FX -->
      <g transform="translate(20, 52)" class="text-terminal">
        <!-- Shell command line -->
        <text x="0" y="20" fill="#38BDF8">PS C:\Users\rithish&gt; <tspan fill="#F8FAFC">java -jar target/equi-sense-core.jar</tspan></text>

        <!-- Dynamic Boot Logs -->
        <!-- Log Line 1 -->
        <g>
          <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.1;1" dur="6s" fill="freeze"/>
          <text x="0" y="50" fill="#22C55E">✔ <tspan fill="#94A3B8">Starting JVM ... Java 17 Runtime active.</tspan></text>
        </g>
        
        <!-- Log Line 2 -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.2;0.25;1" dur="6s" fill="freeze"/>
          <text x="0" y="75" fill="#22C55E">✔ <tspan fill="#94A3B8">HikariPool-1: Connection initialized for MySQL.</tspan></text>
        </g>

        <!-- Log Line 3 -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.35;0.4;1" dur="6s" fill="freeze"/>
          <text x="0" y="100" fill="#22C55E">✔ <tspan fill="#94A3B8">Spring Boot profile: </tspan><tspan fill="#F59E0B">production</tspan></text>
        </g>

        <!-- Log Line 4 -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.55;1" dur="6s" fill="freeze"/>
          <text x="0" y="125" fill="#22C55E">✔ <tspan fill="#94A3B8">WebSocket endpoint </tspan><tspan fill="#00E5FF">/ws/quotes</tspan><tspan fill="#94A3B8"> configured (Port 8080).</tspan></text>
        </g>

        <!-- Log Line 5 -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.65;0.7;1" dur="6s" fill="freeze"/>
          <text x="0" y="150" fill="#22C55E">✔ <tspan fill="#00C8FF">JWT Security Filter Chain initialized</tspan></text>
        </g>

        <!-- Active Running Status -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.8;0.85;1" dur="6s" fill="freeze"/>
          <rect x="0" y="170" width="630" height="40" rx="6" fill="#052E16" stroke="#15803D" stroke-width="1"/>
          
          <circle cx="20" cy="190" r="4" fill="#22C55E">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <text x="35" y="195" fill="#4ADE80" font-weight="700">APPLICATION RUNNING</text>
          <text x="210" y="195" fill="#94A3B8" font-size="12">Equi Sense API is healthy</text>
        </g>

        <!-- Next command cursor line -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.9;0.95;1" dur="6s" fill="freeze"/>
          <text x="0" y="240" fill="#38BDF8">PS C:\Users\rithish&gt; <tspan fill="#F8FAFC">git status</tspan></text>
          
          <!-- Blinking Cursor -->
          <rect x="238" y="226" width="8" height="15" fill="#00E5FF">
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>
    </g>

    <!-- Current Focus Section (Overflow text removed) -->
    <g transform="translate(0, 485)">
      <rect x="0" y="0" width="670" height="48" rx="8" fill="#1E293B" fill-opacity="0.4" stroke="#334155" stroke-width="1"/>
      <circle cx="24" cy="24" r="5" fill="#F59E0B">
        <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="44" y="28" class="text-label" font-weight="700" fill="#F59E0B">CURRENT FOCUS</text>
      <text x="165" y="28" class="text-terminal" font-size="13">Building the Equi Sense Quantitative Trading Engine.</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- 3. Right Side - Profile & Glow (40%)       -->
  <!-- ========================================== -->
  <!-- Floating Profile Container -->
  <g id="profileContainer" class="glow-on-hover">
    <!-- Slow premium vertical floating animation -->
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; 0 -12; 0 0; 0 6; 0 0" 
                      keyTimes="0; 0.35; 0.6; 0.85; 1" 
                      dur="8s" repeatCount="indefinite"/>

    <!-- Glowing Rim Background -->
    <g filter="url(#profileGlow)">
      <rect x="830" y="110" width="370" height="480" rx="24" ry="24" fill="#0A0F1C"/>
    </g>

    <!-- Profile Image Reference & Fallback -->
    <g clip-path="url(#profileClip)">
      <rect x="830" y="110" width="370" height="480" fill="#0F172A"/>
      <!-- Grid Overlay inside Photo -->
      <rect x="830" y="110" width="370" height="480" fill="url(#gridPattern)" opacity="0.3"/>
      
      <!-- Relative image path with legacy fallback -->
      <image href="profile.png" xlink:href="profile.png" x="830" y="110" width="370" height="340" preserveAspectRatio="xMidYMid slice"/>

      <!-- Ambient bottom shadow gradient for integration -->
      <rect x="830" y="300" width="370" height="150" fill="url(#bgGradient)" opacity="0.9"/>
    </g>

    <!-- Premium Glow Border Frame -->
    <rect x="830" y="110" width="370" height="480" rx="24" ry="24" fill="none" stroke="url(#glassStroke)" stroke-width="2.5"/>

    <!-- Geometric Corner Accents on Card -->
    <path d="M 850 110 L 830 110 L 830 130" fill="none" stroke="#00C8FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 1180 110 L 1200 110 L 1200 130" fill="none" stroke="#00C8FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 830 570 L 830 590 L 850 590" fill="none" stroke="#7B5BFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 1200 570 L 1200 590 L 1180 590" fill="none" stroke="#7B5BFF" stroke-width="3" stroke-linecap="round"/>

    <!-- Info Chips on top of the image -->
    <g transform="translate(850, 130)">
      <rect x="0" y="0" width="160" height="32" rx="16" fill="#0B0F19" fill-opacity="0.85" stroke="#1E293B" stroke-width="1"/>
      <circle cx="16" cy="16" r="4.5" fill="#22C55E">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="30" y="20" class="text-terminal" font-size="11" font-weight="700" fill="#E2E8F0">ONLINE / AVAILABLE</text>
    </g>

    <g transform="translate(1085, 130)">
      <rect x="0" y="0" width="95" height="28" rx="14" fill="#0B0F19" fill-opacity="0.85" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5"/>
      <text x="47.5" y="18" text-anchor="middle" class="text-badge">INDIA / PU</text>
    </g>

    <!-- Bottom credentials section under the profile picture -->
    <line x1="860" y1="465" x2="1170" y2="465" stroke="#1E293B" stroke-width="1.5"/>
    <g transform="translate(1015, 498)" text-anchor="middle">
      <text x="0" y="0" font-family="'Inter', sans-serif" font-weight="700" font-size="16" fill="#F8FAFC">Backend Engineer</text>
      <text x="0" y="28" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="11" fill="#22C55E">SPRING BOOT</text>
      <text x="0" y="54" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="11" fill="#00C8FF">QUANTITATIVE TRADING</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- 4. Quick Action Button Row & Meta info     -->
  <!-- ========================================== -->
  <g transform="translate(60, 640)">
    <!-- Contact Button -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="130" height="36" rx="18" fill="url(#accentGradient)" stroke="none"/>
      <text x="65" y="22" text-anchor="middle" class="text-btn">CONTACT ME</text>
    </g>

    <!-- LinkedIn Button -->
    <g transform="translate(145, 0)">
      <rect x="0" y="0" width="130" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="65" y="22" text-anchor="middle" class="text-btn" fill="#F8FAFC">LINKEDIN</text>
    </g>

    <!-- Status progress/pipeline metadata -->
    <g transform="translate(300, 0)">
      <!-- Animated pipeline load bar -->
      <text x="0" y="15" class="text-meta">SYSTEM ARCHITECTURE</text>
      <rect x="0" y="22" width="150" height="4" rx="2" fill="#1E293B"/>
      <rect x="0" y="22" width="0" height="4" rx="2" fill="url(#progressBarGrad)">
        <animate attributeName="width" values="0;120;120;30;150;150" keyTimes="0;0.3;0.5;0.7;0.9;1" dur="10s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

</svg>
